
<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SushiCalculator</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:#0b0b0f}
body{min-height:100vh;font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;background:#0b0b0f;padding:clamp(10px,2.5vw,24px)}
button,input{font:inherit}
.root{width:min(100%,1100px);min-height:calc(100vh - clamp(20px,5vw,48px));margin:0 auto;background:#000;color:#f5f5f7;border-radius:16px;overflow:hidden;position:relative}
.noise{position:absolute;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 70% 60% at 15% 20%,rgba(255,55,48,0.22) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 85% 75%,rgba(48,209,88,0.18) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 55% 10%,rgba(100,100,255,0.10) 0%,transparent 60%)}
.z1{position:relative;z-index:1}

/* splash */
.splash{min-height:inherit;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:clamp(36px,8vw,72px) clamp(16px,5vw,48px)}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:12px}
.hero{font-size:clamp(38px,8vw,72px);font-weight:700;letter-spacing:-.04em;line-height:1;color:#fff;margin-bottom:10px;overflow-wrap:anywhere}
.hero-sub{font-size:15px;font-weight:300;color:rgba(255,255,255,.5);margin-bottom:36px;line-height:1.6}
.cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;width:100%;max-width:560px}
.scard{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);border-radius:12px;padding:22px 18px 20px;cursor:pointer;text-align:left;font-family:inherit;color:#fff;transition:border-color .25s,transform .25s,background .25s;position:relative;overflow:hidden;touch-action:manipulation}
.scard::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;border-radius:inherit}
.scard-r::before{background:radial-gradient(ellipse at top left,rgba(255,69,58,.2),transparent 70%)}
.scard-g::before{background:radial-gradient(ellipse at top left,rgba(48,209,88,.2),transparent 70%)}
.scard:hover{transform:translateY(-4px)}
.scard:hover::before{opacity:1}
.scard-r:hover{border-color:rgba(255,69,58,.5);background:rgba(255,69,58,.06)}
.scard-g:hover{border-color:rgba(48,209,88,.5);background:rgba(48,209,88,.06)}
.scard:active{transform:scale(.97)}
.sbadge{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:20px;display:inline-block;margin-bottom:14px}
.sbadge-r{background:rgba(255,69,58,.18);color:#ff6b63;border:1px solid rgba(255,69,58,.3)}
.sbadge-g{background:rgba(48,209,88,.18);color:#4cd964;border:1px solid rgba(48,209,88,.3)}
.sdots{display:flex;gap:4px;margin-bottom:12px}
.sdot{width:11px;height:11px;border-radius:50%;border:1px solid rgba(255,255,255,.15)}
.sname{font-size:20px;font-weight:700;letter-spacing:-.03em;margin-bottom:4px}
.sinfo{font-size:11px;color:rgba(255,255,255,.4);line-height:1.6}
.sarrow{position:absolute;bottom:18px;right:16px;font-size:18px;color:rgba(255,255,255,.25);transition:transform .2s,color .2s}
.scard:hover .sarrow{transform:translateX(3px);color:rgba(255,255,255,.5)}

/* calculator */
.calc{display:none;flex-direction:column;min-height:inherit}
.calc-header{display:flex;align-items:center;gap:12px;padding:16px clamp(14px,3vw,24px) 12px;border-bottom:1px solid rgba(255,255,255,.08)}
.back{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;flex-shrink:0;transition:background .15s;touch-action:manipulation}
.back:hover{background:rgba(255,255,255,.14)}
.hname{font-size:16px;font-weight:700;letter-spacing:-.02em;flex:1}
.hpill{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.06em}
.calc-body{display:grid;grid-template-columns:minmax(0,1fr) minmax(260px,340px);flex:1;min-height:0;overflow:hidden}
.plates-wrap{overflow-y:auto;padding:clamp(14px,3vw,24px);border-right:1px solid rgba(255,255,255,.07)}
.plates-wrap::-webkit-scrollbar{width:4px}
.plates-wrap::-webkit-scrollbar-track{background:transparent}
.plates-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px}
.slabel{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.28);margin-bottom:10px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:10px}
.pbtn{display:flex;flex-direction:column;align-items:center;gap:7px;padding:13px 10px 11px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:12px;cursor:pointer;font-family:inherit;min-width:0;min-height:96px;position:relative;transition:background .15s,border-color .15s,transform .15s;touch-action:manipulation}
.pbtn:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.18);transform:translateY(-1px)}
.pbtn:active{transform:scale(.95)}
.pbtn.on{border-width:1.5px}
.pring{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}
.pring::after{content:'';position:absolute;inset:3px;border-radius:50%;border:1px solid rgba(255,255,255,.15)}
.pface{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;z-index:1}
.plbl{font-size:12px;font-weight:600;color:rgba(255,255,255,.85)}
.pbadge{position:absolute;top:7px;right:7px;min-width:20px;height:20px;padding:0 5px;border-radius:20px;font-size:10px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;border:1.5px solid #000}

/* summary panel */
.spanel{display:flex;flex-direction:column;background:rgba(255,255,255,.035);overflow:hidden;min-width:0}
.sp-head{padding:14px 14px 0;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.3)}
.sp-body{flex:1;overflow-y:auto;padding:10px 14px 0}
.sp-body::-webkit-scrollbar{display:none}
.empty-s{display:flex;flex-direction:column;align-items:center;justify-content:center;height:120px;gap:8px}
.empty-icon{font-size:26px;opacity:.25}
.empty-msg{font-size:11px;color:rgba(255,255,255,.25);text-align:center;line-height:1.6}
.brow{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);gap:8px}
.brow:last-child{border-bottom:none}
.bname{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.55);flex:1;min-width:0}
.bdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.bright{display:flex;align-items:center;gap:4px;flex-shrink:0}
.bamt{font-size:11px;font-weight:500;color:rgba(255,255,255,.85);min-width:40px;text-align:right}
.qc{display:flex;align-items:center;gap:2px}
.qcb{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:inherit;line-height:1;transition:background .12s;flex-shrink:0;touch-action:manipulation}
.qcb:hover{background:rgba(255,255,255,.18)}
.qcn{font-size:11px;font-weight:600;color:#fff;min-width:16px;text-align:center}
.sp-sub{padding:8px 14px;border-top:1px solid rgba(255,255,255,.07)}
.srow{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,.4);padding:2px 0}
.srow span:last-child{color:rgba(255,255,255,.7);font-weight:500}
.sp-total{padding:10px 14px 12px;border-top:1px solid rgba(255,255,255,.10);display:flex;flex-direction:column;gap:2px}
.tlbl{font-size:11px;color:rgba(255,255,255,.4)}
.tnum{font-size:26px;font-weight:700;letter-spacing:-.04em}
.sp-foot{padding:0 14px 12px;display:flex;justify-content:space-between;align-items:center}
.tnote{font-size:9px;color:rgba(255,255,255,.22)}
.reset-lnk{font-size:10px;color:rgba(255,255,255,.28);background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline;text-underline-offset:2px;padding:0;transition:color .15s}
.reset-lnk:hover{color:rgba(255,255,255,.5)}

/* modal */
.modal-wrap{display:none;position:absolute;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:50;align-items:center;justify-content:center;border-radius:16px;padding:18px}
.modal-wrap.show{display:flex}
.mbox{background:#1c1c1e;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:26px 22px 20px;max-width:300px;width:100%;text-align:center}
.micon{font-size:28px;margin-bottom:10px}
.mtitle{font-size:15px;font-weight:700;margin-bottom:5px}
.msub{font-size:12px;color:rgba(255,255,255,.45);margin-bottom:18px;line-height:1.5}
.mbtns{display:flex;gap:8px}
.mcancel{flex:1;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);font-size:12px;font-weight:500;color:rgba(255,255,255,.6);cursor:pointer;font-family:inherit;transition:background .12s}
.mcancel:hover{background:rgba(255,255,255,.14)}
.mconfirm{flex:1;padding:10px;border-radius:10px;border:none;background:#ff453a;font-size:12px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;transition:opacity .12s}
.mconfirm:hover{opacity:.85}

@media (min-width:900px){
  .root{min-height:min(760px,calc(100vh - clamp(20px,5vw,48px)))}
  .pgrid{grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:12px}
  .pbtn{min-height:112px}
  .pring{width:52px;height:52px}
  .pface{width:33px;height:33px;font-size:9px}
}

@media (max-width:720px){
  body{padding:0;background:#000}
  .root{width:100%;min-height:100vh;border-radius:0}
  .splash{justify-content:flex-start;padding:calc(36px + env(safe-area-inset-top)) 16px calc(24px + env(safe-area-inset-bottom))}
  .cards{grid-template-columns:1fr;max-width:420px}
  .scard:hover{transform:none}
  .calc{min-height:100vh}
  .calc-header{padding:calc(10px + env(safe-area-inset-top)) 14px 10px}
  .calc-body{grid-template-columns:1fr;grid-template-rows:minmax(0,1fr) auto;overflow:visible}
  .plates-wrap{border-right:none;padding:14px 14px 12px;overflow:visible}
  .pgrid{grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
  .pbtn{min-height:92px;padding:11px 6px 9px}
  .spanel{border-top:1px solid rgba(255,255,255,.08);max-height:48vh}
  .sp-body{max-height:22vh}
  .sp-foot{padding-bottom:calc(12px + env(safe-area-inset-bottom))}
}

@media (max-width:380px){
  .hero{font-size:34px}
  .pgrid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .spanel{max-height:52vh}
}
</style>
</head>
<body>

<div class="root">
  <div class="noise"></div>

  <!-- SPLASH -->
  <div class="splash z1" id="splash">
    <div class="eyebrow">คำนวณก่อนจ่าย</div>
    <div class="hero"><br>SushiCalculator</div>
    <div class="hero-sub">เลือกจาน · ดูยอดรวม · รวม SC แล้ว</div>

    <div class="cards">
      <button class="scard scard-r" onclick="startCalc('sushiro')">
        <div class="sbadge sbadge-r">Sushiro</div>
        <div class="sdots">
          <div class="sdot" style="background:#ddd"></div>
          <div class="sdot" style="background:#a00"></div>
          <div class="sdot" style="background:#999"></div>
          <div class="sdot" style="background:#c8a600"></div>
          <div class="sdot" style="background:#222"></div>
        </div>
        <div class="sname">Sushiro</div>
        <div class="sinfo">5 สี · 30–100 ฿<br>+ SC 10%</div>
        <span class="sarrow">→</span>
      </button>

      <button class="scard scard-g" onclick="startCalc('katsu')">
        <div class="sbadge sbadge-g">Katsu Midori</div>
        <div class="sdots">
          <div class="sdot" style="background:#e74c3c"></div>
          <div class="sdot" style="background:#2980b9"></div>
          <div class="sdot" style="background:#27ae60"></div>
          <div class="sdot" style="background:#f39c12"></div>
          <div class="sdot" style="background:#8B4513"></div>
        </div>
        <div class="sname">Katsu Midori</div>
        <div class="sinfo">12 สี · 40–180 ฿<br>+ SC 10%</div>
        <span class="sarrow">→</span>
      </button>
    </div>
  </div>

  <!-- CALCULATOR -->
  <div class="calc z1" id="calc">
    <div class="calc-header">
      <button class="back" onclick="goBack()">←</button>
      <span class="hname" id="hname"></span>
      <span class="hpill" id="hpill">SC 10%</span>
    </div>
    <div class="calc-body">
      <div class="plates-wrap">
        <div class="slabel">เลือกจาน</div>
        <div class="pgrid" id="pgrid"></div>
      </div>
      <div class="spanel">
        <div class="sp-head">สรุปบิล</div>
        <div class="sp-body" id="sbody">
          <div class="empty-s">
            <div class="empty-icon">🍽</div>
            <div class="empty-msg">ยังไม่มีจาน<br>แตะเพื่อเพิ่ม</div>
          </div>
        </div>
        <div id="sfooter"></div>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal-wrap" id="overlay">
    <div class="mbox">
      <div class="micon">🗑</div>
      <div class="mtitle">ล้างทั้งหมด?</div>
      <div class="msub">รายการจะถูกลบออกทั้งหมด</div>
      <div class="mbtns">
        <button class="mcancel" onclick="closeModal()">ยกเลิก</button>
        <button class="mconfirm" onclick="confirmReset()">ล้างเลย</button>
      </div>
    </div>
  </div>
</div>

<script>
const STORES={
  sushiro:{name:'Sushiro',color:'#ff453a',bg:'rgba(255,69,58,.15)',border:'rgba(255,69,58,.35)',
    plates:[
      {price:30,out:'#c8c8c8',inn:'#eee',face:'rgba(0,0,0,.06)',lbl:'ขาว',tx:'#555'},
      {price:40,out:'#8B0000',inn:'#b00',face:'rgba(0,0,0,.2)',lbl:'แดง',tx:'#fff'},
      {price:60,out:'#888',inn:'#aaa',face:'rgba(0,0,0,.15)',lbl:'เงิน',tx:'#fff'},
      {price:80,out:'#9a7a00',inn:'#c8a600',face:'rgba(0,0,0,.15)',lbl:'ทอง',tx:'#fff'},
      {price:100,out:'#1a1a1a',inn:'#2a2a2a',face:'rgba(255,255,255,.07)',lbl:'ดำ',tx:'#bbb'}
    ]},
  katsu:{name:'Katsu Midori',color:'#30d158',bg:'rgba(48,209,88,.15)',border:'rgba(48,209,88,.35)',
    plates:[
      {price:40,out:'#c0392b',inn:'#e74c3c',face:'rgba(0,0,0,.15)',lbl:'แดง',tx:'#fff'},
      {price:50,out:'#1a6a9a',inn:'#2980b9',face:'rgba(0,0,0,.15)',lbl:'ฟ้า',tx:'#fff'},
      {price:60,out:'#1e8449',inn:'#27ae60',face:'rgba(0,0,0,.15)',lbl:'เขียว',tx:'#fff'},
      {price:70,out:'#d68910',inn:'#f39c12',face:'rgba(0,0,0,.15)',lbl:'เหลือง',tx:'#fff'},
      {price:80,out:'#6b3a10',inn:'#8B4513',face:'rgba(0,0,0,.15)',lbl:'น้ำตาล',tx:'#fff'},
      {price:90,out:'#c07060',inn:'#e8a090',face:'rgba(0,0,0,.12)',lbl:'ชมพู',tx:'#fff'},
      {price:100,out:'#8a7040',inn:'#b8a060',face:'rgba(0,0,0,.12)',lbl:'เบจ',tx:'#fff'},
      {price:120,out:'#9a8850',inn:'#c8b070',face:'rgba(0,0,0,.12)',lbl:'ครีม',tx:'#fff'},
      {price:140,out:'#7b241c',inn:'#922b21',face:'rgba(0,0,0,.15)',lbl:'เลือดหมู',tx:'#fff'},
      {price:150,out:'#8a6000',inn:'#c8900a',face:'rgba(0,0,0,.15)',lbl:'ทอง',tx:'#fff'},
      {price:160,out:'#2c4f85',inn:'#4a6fa5',face:'rgba(0,0,0,.15)',lbl:'กรมท่า',tx:'#fff'},
      {price:180,out:'#0d2040',inn:'#1a3a5c',face:'rgba(0,0,0,.2)',lbl:'กรมเข้ม',tx:'#aac'}
    ]}
};

let store=null,counts={};

function startCalc(s){
  store=s;counts={};
  const d=STORES[s];
  document.getElementById('hname').textContent=d.name;
  const p=document.getElementById('hpill');
  p.textContent='SC 10%';p.style.background=d.bg;p.style.color=d.color;p.style.border='1px solid '+d.border;p.style.borderRadius='20px';p.style.padding='4px 10px';p.style.fontSize='10px';p.style.fontWeight='700';p.style.letterSpacing='.06em';
  document.getElementById('splash').style.display='none';
  document.getElementById('calc').style.display='flex';
  render();
}
function goBack(){
  document.getElementById('calc').style.display='none';
  document.getElementById('splash').style.display='flex';
  store=null;counts={};
}
function addP(price){counts[price]=(counts[price]||0)+1;render();}
function remP(price){if((counts[price]||0)>0)counts[price]--;if(counts[price]===0)delete counts[price];render();}

function render(){
  const d=STORES[store];
  // plates
  const grid=document.getElementById('pgrid');
  grid.innerHTML=d.plates.map(p=>{
    const q=counts[p.price]||0,on=q>0;
    const bs=on?`border-color:${p.out};border-width:1.5px;box-shadow:0 0 0 1px ${p.out}22;`:'';
    return`<button class="pbtn${on?' on':''}" style="${bs}" onclick="addP(${p.price})">
      ${on?`<div class="pbadge" style="background:${p.out}">${q}</div>`:''}
      <div class="pring" style="background:${p.out}">
        <div class="pface" style="background:${p.inn}"><span style="color:${p.tx}">${p.lbl}</span></div>
      </div>
      <div class="plbl" style="${on?'color:'+p.out:''}">${p.price}฿</div>
    </button>`;
  }).join('');

  // summary
  const sel=d.plates.filter(p=>(counts[p.price]||0)>0);
  const body=document.getElementById('sbody');
  const foot=document.getElementById('sfooter');
  if(!sel.length){
    body.innerHTML=`<div class="empty-s"><div class="empty-icon">🍽</div><div class="empty-msg">ยังไม่มีจาน<br>แตะเพื่อเพิ่ม</div></div>`;
    foot.innerHTML='';return;
  }
  let sub=0;
  body.innerHTML=sel.map(p=>{
    const q=counts[p.price],line=p.price*q;sub+=line;
    return`<div class="brow">
      <div class="bname"><div class="bdot" style="background:${p.out}"></div>${p.price}฿</div>
      <div class="bright">
        <div class="bamt">${line.toLocaleString()}฿</div>
        <div class="qc">
          <button class="qcb" onclick="remP(${p.price})">−</button>
          <span class="qcn">${q}</span>
          <button class="qcb" onclick="addP(${p.price})">+</button>
        </div>
      </div>
    </div>`;
  }).join('');
  const sc=Math.round(sub*.1),total=sub+sc;
  foot.innerHTML=`
    <div class="sp-sub">
      <div class="srow"><span>ก่อน SC</span><span>${sub.toLocaleString()}฿</span></div>
      <div class="srow"><span>SC 10%</span><span>+${sc.toLocaleString()}฿</span></div>
    </div>
    <div class="sp-total">
      <div class="tlbl">รวมทั้งหมด</div>
      <div class="tnum" style="color:${d.color}">${total.toLocaleString()}฿</div>
    </div>
    <div class="sp-foot">
      <span class="tnote">* รวม SC 10%</span>
      <button class="reset-lnk" onclick="askReset()">ล้างทั้งหมด</button>
    </div>`;
}

function askReset(){if(Object.values(counts).some(v=>v>0))document.getElementById('overlay').classList.add('show');}
function closeModal(){document.getElementById('overlay').classList.remove('show');}
function confirmReset(){closeModal();counts={};render();}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
</script>
</body>
</html>
